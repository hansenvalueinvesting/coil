name: nightly-breakout-scan

on:
  schedule:
    # 22:30 UTC on weekdays — ~30 min after US market close (ET). Tue–Sat UTC
    # covers Mon–Fri sessions.
    - cron: "30 22 * * 2-6"
  workflow_dispatch:        # manual "Run workflow" button

permissions:
  contents: write           # allow committing results.json back to the repo

concurrency:
  group: scan
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests numpy pandas

      - name: Run scan
        run: python scan.py

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results.json
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "scan: results $(date -u +%Y-%m-%d)"
            git push
          fi
