<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coil — Consolidation-Breakout Scanner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0c0f; --panel:#11151a; --panel-2:#161b22; --line:#232b34;
    --ink:#e6edf3; --dim:#8b98a5; --faint:#5b6672;
    --up:#3fb950; --break:#ff9f1c; --break-glow:rgba(255,159,28,.14);
    --ceiling:#ff9f1c; --vol:#2a3540; --accent:#58a6ff;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--bg); color:var(--ink);
    font-family:'JetBrains Mono',monospace; font-size:13px;
    -webkit-font-smoothing:antialiased; line-height:1.5;
    padding:28px 20px 80px;
  }
  .wrap{max-width:1100px;margin:0 auto}

  /* header */
  header{border-bottom:1px solid var(--line);padding-bottom:20px;margin-bottom:22px}
  .title{
    font-family:'Space Grotesk',sans-serif;font-weight:700;
    font-size:30px;letter-spacing:-.02em;display:flex;align-items:baseline;gap:12px;
  }
  .title .mark{color:var(--break)}
  .sub{color:var(--dim);font-size:12px;margin-top:6px}
  .sub b{color:var(--ink);font-weight:500}

  /* params bar */
  .params{
    display:flex;flex-wrap:wrap;gap:8px;margin-top:16px;
  }
  .chip{
    background:var(--panel);border:1px solid var(--line);border-radius:4px;
    padding:5px 9px;font-size:11px;color:var(--dim);
  }
  .chip b{color:var(--accent);font-weight:500}

  /* table */
  .tbl{width:100%;border-collapse:collapse;margin-top:4px}
  .tbl thead th{
    text-align:right;font-weight:500;color:var(--faint);font-size:11px;
    text-transform:uppercase;letter-spacing:.06em;padding:8px 12px;
    border-bottom:1px solid var(--line);cursor:pointer;user-select:none;white-space:nowrap;
  }
  .tbl thead th:first-child{text-align:left}
  .tbl thead th.active{color:var(--break)}
  .tbl thead th .arw{opacity:.5;font-size:9px}
  .tbl tbody tr{border-bottom:1px solid var(--panel-2);cursor:pointer;transition:background .12s}
  .tbl tbody tr:hover{background:var(--panel)}
  .tbl tbody tr.open{background:var(--panel)}
  .tbl td{padding:11px 12px;text-align:right;white-space:nowrap;font-variant-numeric:tabular-nums}
  .tbl td:first-child{text-align:left}
  .sym{font-weight:700;font-size:14px;letter-spacing:.02em}
  .pos{color:var(--up)} .brk{color:var(--break);font-weight:500}
  .muted{color:var(--faint)}
  .volx{color:var(--break);font-weight:700}

  /* expanded chart row */
  .detail td{padding:0;background:var(--panel-2)}
  .detail-inner{padding:18px 12px 22px;display:grid;grid-template-columns:1fr 200px;gap:20px;align-items:center}
  @media(max-width:640px){.detail-inner{grid-template-columns:1fr}}
  canvas{width:100%;height:180px;display:block;background:var(--bg);border:1px solid var(--line);border-radius:5px}
  .stats{display:grid;grid-template-columns:1fr 1fr;gap:10px 14px;font-size:11px}
  .stat .k{color:var(--faint);text-transform:uppercase;letter-spacing:.05em;font-size:10px}
  .stat .v{color:var(--ink);font-size:15px;font-family:'Space Grotesk',sans-serif;font-weight:600}
  .legend{grid-column:1/-1;display:flex;gap:16px;color:var(--dim);font-size:10px;margin-top:2px}
  .legend i{display:inline-block;width:16px;height:2px;vertical-align:middle;margin-right:5px}

  .empty{padding:50px 12px;text-align:center;color:var(--dim);border:1px dashed var(--line);border-radius:6px;margin-top:16px}
  .empty b{color:var(--ink);font-family:'Space Grotesk',sans-serif}
  footer{margin-top:30px;color:var(--faint);font-size:11px;text-align:center}
  footer a{color:var(--accent);text-decoration:none}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="title"><span class="mark">▲</span> Coil</div>
    <div class="sub">Equities that compressed into a tight base, then <b>closed above the ceiling on expanded volume</b>. Signal fires on the breakout candle's close.</div>
    <div class="params" id="params"></div>
  </header>

  <div id="content"></div>

  <footer>
    Data: Yahoo Finance daily bars · Universe: Nasdaq Trader listings · Nightly via GitHub Actions
  </footer>
</div>

<script>
const fmtVol = v => v>=1e9?(v/1e9).toFixed(1)+'B':v>=1e6?(v/1e6).toFixed(1)+'M':v>=1e3?(v/1e3).toFixed(0)+'K':v;
let DATA=null, sortKey='vol_mult', sortDir=-1;

const COLS=[
  {k:'symbol',      t:'Ticker'},
  {k:'close',       t:'Close'},
  {k:'breakout_pct',t:'Break %'},
  {k:'vol_mult',    t:'Vol ×'},
  {k:'base_range_pct',t:'Base Range'},
  {k:'atr_contraction',t:'ATR Contr'},
  {k:'avg_base_vol',t:'Avg Vol'},
  {k:'date',        t:'Date'},
];

fetch('results.json?_='+Date.now())
  .then(r=>r.json())
  .then(d=>{DATA=d;render();})
  .catch(()=>{document.getElementById('content').innerHTML=
    '<div class="empty"><b>No results file yet.</b><br>The nightly scan writes results.json — trigger the workflow or wait for the next run.</div>';});

function render(){
  const p=DATA.params;
  document.getElementById('params').innerHTML=[
    ['Base', p.base_len+'d'],
    ['Max range', '≤'+p.max_base_range_pct+'%'],
    ['Vol trigger', '≥'+p.vol_mult+'×'],
    ['Contraction', p.require_contraction?'on':'off'],
    ['Min price', '$'+p.min_price],
    ['Min vol', fmtVol(p.min_avg_vol)],
  ].map(([k,v])=>`<span class="chip">${k} <b>${v}</b></span>`).join('')
   +`<span class="chip">Scanned <b>${DATA.universe_size.toLocaleString()}</b></span>`
   +`<span class="chip">Hits <b>${DATA.hit_count}</b></span>`
   +`<span class="chip">${DATA.generated_utc}</span>`;

  const c=document.getElementById('content');
  if(!DATA.hits.length){
    c.innerHTML='<div class="empty"><b>No breakouts today.</b><br>No equity in the universe closed above its base ceiling on qualifying volume. That is a normal, quiet-tape result.</div>';
    return;
  }
  const th=COLS.map(col=>`<th data-k="${col.k}" class="${col.k===sortKey?'active':''}">${col.t}<span class="arw"> ${col.k===sortKey?(sortDir<0?'▼':'▲'):''}</span></th>`).join('');
  c.innerHTML=`<table class="tbl"><thead><tr>${th}</tr></thead><tbody id="rows"></tbody></table>`;
  c.querySelectorAll('th').forEach(t=>t.onclick=()=>{
    const k=t.dataset.k;
    if(k===sortKey)sortDir*=-1;else{sortKey=k;sortDir=-1;}
    render();
  });
  drawRows();
}

function drawRows(){
  const rows=[...DATA.hits].sort((a,b)=>{
    let x=a[sortKey],y=b[sortKey];
    if(typeof x==='string')return sortDir*x.localeCompare(y);
    return sortDir*((x??0)-(y??0));
  });
  const tb=document.getElementById('rows');
  tb.innerHTML=rows.map((h,i)=>`
    <tr data-i="${i}">
      <td class="sym">${h.symbol}</td>
      <td>$${h.close.toFixed(2)}</td>
      <td class="brk">+${h.breakout_pct}%</td>
      <td class="volx">${h.vol_mult}×</td>
      <td class="muted">${h.base_range_pct}%</td>
      <td class="muted">${h.atr_contraction??'—'}</td>
      <td class="muted">${fmtVol(h.avg_base_vol)}</td>
      <td class="muted">${h.date}</td>
    </tr>
    <tr class="detail" id="d${i}" style="display:none"><td colspan="${COLS.length}">
      <div class="detail-inner">
        <canvas id="cv${i}"></canvas>
        <div class="stats">
          <div class="stat"><div class="k">Base ceiling</div><div class="v">$${h.base_high.toFixed(2)}</div></div>
          <div class="stat"><div class="k">Breakout close</div><div class="v brk">$${h.close.toFixed(2)}</div></div>
          <div class="stat"><div class="k">Volume ×</div><div class="v">${h.vol_mult}×</div></div>
          <div class="stat"><div class="k">Base low</div><div class="v">$${h.base_low.toFixed(2)}</div></div>
          <div class="legend">
            <span><i style="background:#3fb950"></i>Close</span>
            <span><i style="background:#ff9f1c"></i>Base ceiling</span>
            <span><i style="background:#2a3540"></i>Volume</span>
          </div>
        </div>
      </div>
    </td></tr>`).join('');

  tb.querySelectorAll('tr[data-i]').forEach(tr=>{
    tr.onclick=()=>{
      const i=tr.dataset.i, d=document.getElementById('d'+i);
      const showing=d.style.display!=='none';
      d.style.display=showing?'none':'';
      tr.classList.toggle('open',!showing);
      if(!showing)requestAnimationFrame(()=>drawChart('cv'+i,rows[i]));
    };
  });
}

function drawChart(id,h){
  const cv=document.getElementById(id);
  const dpr=window.devicePixelRatio||1;
  const W=cv.clientWidth,H=cv.clientHeight;
  cv.width=W*dpr;cv.height=H*dpr;
  const g=cv.getContext('2d');g.scale(dpr,dpr);
  g.clearRect(0,0,W,H);

  const ch=h.chart, close=ch.close, vol=ch.volume, n=close.length;
  const padL=6,padR=6,padT=10,padB=6;
  const plotW=W-padL-padR, plotH=H-padT-padB;
  const volH=plotH*0.26, priceH=plotH-volH-6;

  const lo=Math.min(...close, ch.base_high)*0.995;
  const hi=Math.max(...close, ch.base_high)*1.005;
  const x=i=>padL+plotW*i/(n-1);
  const yP=v=>padT+priceH*(1-(v-lo)/(hi-lo));
  const maxV=Math.max(...vol);
  const yV=v=>padT+priceH+6+volH*(1-v/maxV);

  // volume bars
  const bw=Math.max(1,plotW/n*0.6);
  vol.forEach((v,i)=>{
    g.fillStyle = (i===n-1)?'rgba(255,159,28,.55)':'#2a3540';
    g.fillRect(x(i)-bw/2, yV(v), bw, padT+priceH+6+volH-yV(v));
  });

  // base ceiling line
  g.strokeStyle='#ff9f1c';g.lineWidth=1;g.setLineDash([4,3]);
  g.beginPath();g.moveTo(padL,yP(ch.base_high));g.lineTo(W-padR,yP(ch.base_high));g.stroke();
  g.setLineDash([]);

  // close line
  g.strokeStyle='#3fb950';g.lineWidth=1.6;g.beginPath();
  close.forEach((v,i)=>{i?g.lineTo(x(i),yP(v)):g.moveTo(x(i),yP(v));});
  g.stroke();

  // breakout marker
  g.fillStyle='#ff9f1c';
  g.beginPath();g.arc(x(n-1),yP(close[n-1]),3.5,0,7);g.fill();
}
</script>
</body>
</html>
